services:
  - type: web
    name: stage-manager-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    routes:
      - path: /api
        destination: /api
      - path: /
        destination: /
    envVars:
      - key: DATABASE_URL
        scope: build,runtime
        sync: false
      - key: ADMIN_USERNAME
        scope: build,runtime
        sync: false
      - key: ADMIN_PASSWORD
        scope: build,runtime
        sync: false
      - key: ALLOWED_ORIGINS
        scope: build,runtime
        sync: false
      - key: PYTHONUNBUFFERED
        value: 1
      - key: PYTHON_VERSION
        value: 3.11
    staticPublishPath: frontend
    autoDeploy: true

  - type: static_site
    name: stage-manager-frontend
    staticPublishPath: frontend
    routes:
      - path: /
        destination: index.html
